<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Username Checker · topstop5</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --panel: #080808;
      --card: #101010;
      --entry: #050505;
      --text: #f3f3f3;
      --muted: #9d9d9d;
      --accent: #7C3AED;
      --accent-h: #6D28D9;
      --accent-b: #5B21B6;
      --success: #22C55E;
      --error: #EF4444;
      --warn: #F59E0B;
      --neutral: #6B7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .app {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(124,58,237,0.2);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      transition: color 0.2s;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(124,58,237,0.4); }

    .header-title {
      display: flex;
      flex-direction: column;
    }

    .header-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ── Input panel ── */
    .input-panel {
      background: var(--panel);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 16px;
    }

    textarea {
      background: var(--entry);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 12px 14px;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--neutral); }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 160px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:disabled { background: #333; color: var(--muted); cursor: not-allowed; }

    .btn-stop {
      background: #8B0000;
      color: #fff;
    }
    .btn-stop:hover { background: #6a0000; }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 12px;
      padding: 8px 14px;
    }
    .btn-secondary:hover { border-color: rgba(124,58,237,0.4); color: var(--text); }

    .options-row {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #222;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #333;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 2px;
      top: 2px;
      background: var(--muted);
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent-b); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #fff; }

    .concurrency-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    input[type=range] {
      accent-color: var(--accent);
      width: 90px;
    }

    #concurrency-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      min-width: 20px;
    }

    /* ── Status bar ── */
    .status-bar {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      padding: 10px 0;
      letter-spacing: 0.5px;
      min-height: 34px;
    }

    .status-bar span { color: var(--accent); }

    /* ── Results ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .results-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .copy-btns {
      display: flex;
      gap: 8px;
    }

    .copy-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 5px 10px;
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--text); }

    #results-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: 12px;
      align-items: center;
      animation: slideIn 0.25s ease;
    }

    .card.ok    { border-left: 3px solid var(--success); }
    .card.notfound { border-left: 3px solid var(--error); }
    .card.warn  { border-left: 3px solid var(--warn); }
    .card.loading { border-left: 3px solid #333; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-avatar {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: #1a1a1a;
      overflow: hidden;
      flex-shrink: 0;
    }
    .card-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-avatar.skeleton {
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { background: #1a1a1a; }
      50% { background: #282828; }
    }

    .card-info {
      min-width: 0;
    }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-uuid {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: #444;
      margin-top: 2px;
    }

    .card-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .badge-ok      { background: rgba(34,197,94,0.1);  color: var(--success); border: 1px solid rgba(34,197,94,0.25); }
    .badge-notfound{ background: rgba(239,68,68,0.1);   color: var(--error);   border: 1px solid rgba(239,68,68,0.25); }
    .badge-warn    { background: rgba(245,158,11,0.1);  color: var(--warn);    border: 1px solid rgba(245,158,11,0.25); }
    .badge-loading { background: rgba(107,114,128,0.1); color: var(--neutral); border: 1px solid #333; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--neutral);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      border: 1px dashed #1a1a1a;
      border-radius: 12px;
    }

    .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .input-row { grid-template-columns: 1fr; }
      .controls { flex-direction: row; flex-wrap: wrap; min-width: unset; }
      .card { grid-template-columns: 48px 1fr; }
      .card-badge { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="back-btn">← back</a>
    <div class="header-title">
      <div class="header-tag">// minecraft</div>
      <h1>Username Checker</h1>
    </div>
  </div>

  <!-- Input panel -->
  <div class="input-panel">
    <div class="input-row">
      <textarea id="input-box" placeholder="Enter usernames, one per line...&#10;&#10;Notch&#10;Dream&#10;Technoblade"></textarea>
      <div class="controls">
        <button class="btn btn-primary" id="check-btn" onclick="startCheck()">⛏ Check</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
        <button class="btn btn-secondary" onclick="copyFound()">Copy Found</button>
      </div>
    </div>
    <div class="options-row">
      <label class="option-label">
        <span>Name History</span>
        <label class="toggle">
          <input type="checkbox" id="history-toggle">
          <span class="toggle-slider"></span>
        </label>
      </label>
      <div class="concurrency-label">
        Concurrency:
        <input type="range" id="concurrency" min="1" max="10" value="5" oninput="document.getElementById('concurrency-val').textContent=this.value">
        <span id="concurrency-val">5</span>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="status-bar">
    <span>//</span> ready — enter usernames above and hit check
  </div>

  <!-- Results -->
  <div class="results-header">
    <div class="results-title">Results</div>
    <div class="copy-btns">
      <button class="copy-btn" onclick="copyList('found')">copy found</button>
      <button class="copy-btn" onclick="copyList('notfound')">copy not found</button>
    </div>
  </div>

  <div id="results-list">
    <div class="empty-state">
      <div class="empty-icon">⛏</div>
      results will appear here
    </div>
  </div>

</div>

<script>
  // ── State ──
  let running = false;
  let stopRequested = false;
  let foundUsernames = [];
  let notFoundUsernames = [];

  const PROXY = 'https://corsproxy.io/?url=';
  const PROFILE_URL = u => `${PROXY}${encodeURIComponent(`https://api.mojang.com/users/profiles/minecraft/${u}`)}`;
  const HISTORY_URL = id => `${PROXY}${encodeURIComponent(`https://api.mojang.com/user/profiles/${id}/names`)}`;

  // ── Utils ──
  function setStatus(msg) {
    document.getElementById('status-bar').innerHTML = `<span>//</span> ${msg}`;
  }

  function validUsername(name) {
    return /^[A-Za-z0-9_]{3,16}$/.test(name);
  }

  function clearAll() {
    document.getElementById('input-box').value = '';
    document.getElementById('results-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⛏</div>
        results will appear here
      </div>`;
    foundUsernames = [];
    notFoundUsernames = [];
    setStatus('<span>//</span> cleared');
  }

  function copyFound() {
    if (!foundUsernames.length) return;
    navigator.clipboard.writeText(foundUsernames.join('\n'));
    setStatus('copied found usernames to clipboard');
  }

  function copyList(type) {
    const list = type === 'found' ? foundUsernames : notFoundUsernames;
    if (!list.length) { setStatus('nothing to copy'); return; }
    navigator.clipboard.writeText(list.join('\n'));
    setStatus(`copied ${list.length} ${type === 'found' ? 'found' : 'not found'} username(s)`);
  }

  // ── Skeleton card ──
  function insertSkeleton(username) {
    const list = document.getElementById('results-list');
    // Remove empty state
    const empty = list.querySelector('.empty-state');
    if (empty) empty.remove();

    const card = document.createElement('div');
    card.className = 'card loading';
    card.id = `card-${username.toLowerCase()}`;
    card.innerHTML = `
      <div class="card-avatar skeleton"></div>
      <div class="card-info">
        <div class="card-name" style="color:var(--muted)">${username}</div>
        <div class="card-sub">checking...</div>
      </div>
      <div class="card-badge badge-loading">...</div>`;
    list.appendChild(card);
  }

  // ── Replace skeleton ──
  function updateCard(username, data) {
    const card = document.getElementById(`card-${username.toLowerCase()}`);
    if (!card) return;

    if (data.ok) {
      const resolved = data.name || username;
      const uuid = data.id || '';
      const shortUuid = uuid ? uuid.replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/, '$1-$2-$3-$4-$5') : '';
      const historyNote = data.history ? ` · ${data.history} name(s) in history` : '';

      card.className = 'card ok';
      card.innerHTML = `
        <div class="card-avatar">
          <img src="https://minotar.net/helm/${resolved}/48" alt="${resolved}" onerror="this.parentElement.style.background='#1a1a1a';this.remove()">
        </div>
        <div class="card-info">
          <div class="card-name">${resolved}</div>
          <div class="card-sub">UUID: ${shortUuid}${historyNote}</div>
          ${data.changedName ? '<div class="card-uuid">⚠ name changed</div>' : ''}
        </div>
        <div class="card-badge badge-ok">FOUND</div>`;
      foundUsernames.push(resolved);

    } else if (data.notFound) {
      card.className = 'card notfound';
      card.innerHTML = `
        <div class="card-avatar" style="display:flex;align-items:center;justify-content:center;font-size:22px;opacity:0.3">✗</div>
        <div class="card-info">
          <div class="card-name" style="color:var(--muted)">${username}</div>
          <div class="card-sub">does not exist</div>
        </div>
        <div class="card-badge badge-notfound">404</div>`;
      notFoundUsernames.push(username);

    } else {
      card.className = 'card warn';
      card.innerHTML = `
        <div class="card-avatar" style="display:flex;align-items:center;justify-content:center;font-size:22px;opacity:0.3">?</div>
        <div class="card-info">
          <div class="card-name" style="color:var(--warn)">${username}</div>
          <div class="card-sub">${data.reason || 'request failed'}</div>
        </div>
        <div class="card-badge badge-warn">ERROR</div>`;
    }
  }

  // ── Fetch single username ──
  async function checkUsername(username, tryHistory) {
    try {
      const res = await fetch(PROFILE_URL(username));

      if (res.status === 429) return { rateLimited: true };
      if (res.status === 404) return { notFound: true };
      if (!res.ok) return { ok: false, reason: `HTTP ${res.status}` };

      const data = await res.json();
      const result = { ok: true, name: data.name, id: data.id };

      if (tryHistory && data.id) {
        try {
          const hRes = await fetch(HISTORY_URL(data.id));
          if (hRes.ok) {
            const hData = await hRes.json();
            result.history = hData.length;
            result.changedName = hData.length > 1;
          }
        } catch {}
      }

      return result;
    } catch (e) {
      return { ok: false, reason: 'network error' };
    }
  }

  // ── Retry rate-limited ──
  async function retryRateLimited(usernames, tryHistory) {
    const retried = [];
    for (const u of usernames) {
      setStatus(`retrying rate-limited: ${u}...`);
      let success = false;
      for (let attempt = 1; attempt <= 3; attempt++) {
        const wait = (3 + Math.random() * 3) * attempt * 1000;
        await new Promise(r => setTimeout(r, wait));
        const result = await checkUsername(u, tryHistory);
        if (!result.rateLimited) {
          updateCard(u, result);
          success = true;
          break;
        }
        setStatus(`still rate-limited: ${u} (attempt ${attempt}/3)...`);
      }
      if (!success) {
        updateCard(u, { ok: false, reason: 'rate limited – gave up after 3 retries' });
      }
      retried.push(u);
    }
    return retried;
  }

  // ── Main check ──
  async function startCheck() {
    if (running) {
      stopRequested = true;
      setStatus('stopping after current batch...');
      document.getElementById('check-btn').disabled = true;
      return;
    }

    const raw = document.getElementById('input-box').value.trim();
    const lines = [...new Set(raw.split('\n').map(l => l.trim()).filter(Boolean))];
    const usernames = lines.filter(u => validUsername(u));
    const invalid = lines.filter(u => !validUsername(u));

    if (!usernames.length) {
      setStatus('no valid usernames entered');
      return;
    }

    // Reset
    foundUsernames = [];
    notFoundUsernames = [];
    running = true;
    stopRequested = false;
    const btn = document.getElementById('check-btn');
    btn.textContent = '⏹ Stop';
    btn.className = 'btn btn-stop';

    const tryHistory = document.getElementById('history-toggle').checked;
    const concurrency = parseInt(document.getElementById('concurrency').value);
    const rateLimitedQueue = [];

    // Clear old results and insert skeletons
    document.getElementById('results-list').innerHTML = '';
    for (const u of usernames) insertSkeleton(u);
    if (invalid.length) setStatus(`checking ${usernames.length} valid username(s) — ${invalid.length} skipped (invalid)`);
    else setStatus(`checking ${usernames.length} username(s)...`);

    // Process in batches
    for (let i = 0; i < usernames.length; i += concurrency) {
      if (stopRequested) break;
      const batch = usernames.slice(i, i + concurrency);
      const results = await Promise.all(batch.map(u => checkUsername(u, tryHistory)));

      results.forEach((result, idx) => {
        const u = batch[idx];
        if (result.rateLimited) {
          rateLimitedQueue.push(u);
        } else {
          updateCard(u, result);
        }
      });

      setStatus(`checked ${Math.min(i + concurrency, usernames.length)} / ${usernames.length}...`);
    }

    // Handle rate-limited
    if (rateLimitedQueue.length) {
      setStatus(`retrying ${rateLimitedQueue.length} rate-limited username(s)...`);
      await retryRateLimited(rateLimitedQueue, tryHistory);
    }

    // Done
    running = false;
    btn.textContent = '⛏ Check';
    btn.className = 'btn btn-primary';
    btn.disabled = false;

    const stopped = stopRequested ? ' (stopped early)' : '';
    setStatus(`done${stopped} — ✓ ${foundUsernames.length} found  ✗ ${notFoundUsernames.length} not found  · total: ${foundUsernames.length + notFoundUsernames.length}`);
  }
</script>
</body>
</html>
