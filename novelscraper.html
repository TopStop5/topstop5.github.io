  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000; --panel: #080808; --entry: #050505;
      --text: #f3f3f3; --muted: #9d9d9d; --accent: #7C3AED; --accent-h: #6D28D9;
      --accent2: #a855f7; --success: #22C55E; --error: #EF4444; --warn: #F59E0B; --never: #919191;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 0;
    }
    .app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 28px 20px 80px; }

    .page-brand { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; margin-bottom: 34px; }
    .brand-tag  { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s; }
    .brand-name { font-size: clamp(48px, 10vw, 80px); font-weight: 700; letter-spacing: -1px; line-height: 1; opacity: 0; animation: fadeUp 0.7s ease forwards 0.4s; }
    .brand-name span { color: var(--accent2); }
    .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0; animation: fadeIn 0.6s ease forwards 0.7s; margin: 0 auto 28px; }

    .header { display: flex; align-items: center; gap: 16px; margin-bottom: 36px; padding-bottom: 20px; border-bottom: 1px solid rgba(124,58,237,0.2); opacity: 0; animation: fadeUp 0.7s ease forwards 0.9s; }
    .back-btn { text-decoration: none; color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 1px; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; transition: all 0.2s; }
    .back-btn:hover { color: var(--text); border-color: rgba(124,58,237,0.4); }
    .header-title { display: flex; flex-direction: column; }
    .header-tag { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent2); text-transform: uppercase; }
    h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; }

    .panel { background: var(--panel); border: 1px solid rgba(124,58,237,0.25); border-radius: 12px; padding: 24px; margin-bottom: 20px; opacity: 0; animation: fadeUp 0.7s ease forwards 1.05s; }
    .panel-title { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 16px; }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; }
    select, input[type=text], input[type=number] {
      width: 100%; background: var(--entry); border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px; color: var(--text); font-family: 'Rajdhani', sans-serif;
      font-size: 14px; font-weight: 500; padding: 10px 14px; outline: none;
      transition: border-color 0.2s; appearance: none;
    }
    select:focus, input:focus { border-color: var(--accent); }
    select option { background: #111; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .format-row { display: flex; gap: 10px; }
    .fmt-btn { flex: 1; padding: 10px; border: 1px solid #1e1e1e; border-radius: 8px; background: transparent; color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .fmt-btn:hover { border-color: rgba(124,58,237,0.4); color: var(--text); }
    .fmt-btn.active { border-color: var(--accent); background: rgba(124,58,237,0.1); color: var(--text); }
    .submit-btn { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 20px; }
    .submit-btn:hover { background: var(--accent-h); }
    .submit-btn:disabled { background: #222; color: var(--muted); cursor: not-allowed; }

    /* ── Collapsibles ── */
    .collapsible { margin-bottom: 10px; opacity: 0; animation: fadeUp 0.6s ease forwards 1.05s; }
    .coll-toggle { display: flex; align-items: center; justify-content: space-between; padding: 11px 18px; background: transparent; border: 1px solid #1a1a1a; border-radius: 10px; cursor: pointer; user-select: none; transition: all 0.22s; }
    .coll-toggle:hover { border-color: rgba(124,58,237,0.3); background: rgba(124,58,237,0.03); }
    .coll-toggle.open { border-radius: 10px 10px 0 0; border-color: rgba(124,58,237,0.25); border-bottom-color: transparent; }
    .coll-label { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; }
    .coll-label-right { display: flex; align-items: center; gap: 8px; }
    .coll-chevron { font-size: 10px; color: #333; transition: transform 0.22s, color 0.22s; }
    .coll-toggle.open .coll-chevron { transform: rotate(180deg); color: var(--muted); }
    .coll-body { max-height: 0; overflow: hidden; border: 1px solid rgba(124,58,237,0.25); border-top: none; border-radius: 0 0 10px 10px; background: #070707; opacity: 0; transition: max-height 0.45s ease, opacity 0.4s ease; }
    .coll-body.visible { max-height: 600px; opacity: 1; }

    /* Status badge */
    .status-badge { font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 3px; letter-spacing: 0.5px; }
    .status-badge.running { color: var(--warn);    background: rgba(245,158,11,0.08);  border: 1px solid rgba(245,158,11,0.2); }
    .status-badge.done    { color: var(--success); background: rgba(34,197,94,0.08);   border: 1px solid rgba(34,197,94,0.2); }
    .status-badge.error   { color: var(--error);   background: rgba(239,68,68,0.08);   border: 1px solid rgba(239,68,68,0.2); }

    /* Progress body */
    .progress-inner { padding: 16px 18px; }
    .progress-wrap { height: 3px; background: #111; border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
    .progress-bar  { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.4s ease; }
    .log { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); line-height: 1.9; min-height: 40px; max-height: 220px; overflow-y: auto; }
    .log .ok   { color: var(--success); }
    .log .warn { color: var(--warn); }
    .log .err  { color: var(--error); }
    .log .info { color: var(--accent2); }
    .download-area { margin-top: 14px; padding-top: 12px; border-top: 1px solid #111; display: none; }
    .download-area.visible { display: block; }
    .download-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); border-radius: 8px; color: var(--success); text-decoration: none; font-size: 14px; font-weight: 700; letter-spacing: 1px; transition: all 0.2s; }
    .download-link:hover { background: rgba(34,197,94,0.18); }

    /* Sites list */
    .site-row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid #0e0e0e; transition: background 0.2s; }
    .site-row:hover { background: rgba(124,58,237,0.04); }
    .site-row:last-child { border-bottom: none; }
    .site-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .site-dot.green  { background: var(--success); box-shadow: 0 0 5px rgba(34,197,94,0.5); }
    .site-dot.yellow { background: var(--warn);    box-shadow: 0 0 5px rgba(245,158,11,0.4); }
    .site-dot.gray { background: var(--never);    box-shadow: 0 0 5px rgba(53, 52, 52, 0.4); }
    .site-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .site-name { font-size: 14px; font-weight: 600; }
    .site-url  { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #3a3a3a; margin-top: 1px; }
    .site-status { font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 3px; white-space: nowrap; }
    .site-status.green  { color: var(--success); background: rgba(34,197,94,0.07);  border: 1px solid rgba(34,197,94,0.15); }
    .site-status.yellow { color: var(--warn);    background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.15); }
    .site-status.gray { color: var(--never);    background: rgba(112, 111, 111, 0.07); border: 1px solid rgba(112, 111, 111, 0.15); }
    .progress-section { display: none; }
    .progress-section.visible { display: block; }

    .api-notice { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #252525; text-align: center; margin-top: 28px; letter-spacing: 0.5px; opacity: 0; animation: fadeIn 0.6s ease forwards 1.2s; }
    .api-notice a { color: #383838; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @media (max-width: 500px) { .row-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app">

  <div class="page-brand">
    <div class="brand-tag">// tools by</div>
    <div class="brand-name">Top<span>Stop5</span></div>
  </div>
  <div class="divider"></div>

  <div class="header">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="header-title">
      <div class="header-tag">// topstop5</div>
      <h1>Novel Scraper</h1>
    </div>
  </div>

  <!-- Config panel -->
  <div class="panel">
    <div class="panel-title">Configure Download</div>
    <div class="field">
      <label>Site</label>
      <select id="site-select" onchange="onSiteChange()">
        <option value="">— Select A Site —</option>
        <option value="novelfire">NovelFire (novelfire.net)</option>
        <option value="wetriedtls">WeTriedTLS (wetriedtls.com)</option>
        <option value="webnoveltranslations">Webnovel Translations (webnoveltranslations.net)</option>
      </select>
    </div>
    <div class="field">
      <label>Novel URL</label>
      <input type="text" id="novel-url" placeholder="Paste the novel page URL here...">
    </div>
    <div class="row-2">
      <div class="field">
        <label>Start Chapter</label>
        <input type="number" id="start-ch" value="1" min="1">
      </div>
      <div class="field">
        <label>End Chapter</label>
        <input type="number" id="end-ch" value="10" min="1">
      </div>
    </div>
    <div class="field">
      <label>Download Format</label>
      <div class="format-row">
        <button class="fmt-btn active" id="fmt-txt"  onclick="setFormat('txt')">TXT (ZIP)</button>
        <button class="fmt-btn"        id="fmt-epub" onclick="setFormat('epub')">EPUB</button>
      </div>
    </div>
    <button class="submit-btn" id="scrape-btn" onclick="startScrape()">⬇ Scrape Chapters</button>
  </div>

  <!-- Supported sites -->
  <div class="collapsible">
    <div class="coll-toggle" id="sites-toggle" onclick="toggleCollapsible('sites')">
      <span class="coll-label">Supported Sites</span>
      <span class="coll-chevron" id="sites-chevron">▼</span>
    </div>
    <div class="coll-body" id="sites-body">
      <div class="site-row">
        <span class="site-dot green"></span>
        <div class="site-info"><span class="site-name">NovelFire</span><span class="site-url">Novelfire.net</span></div>
        <span class="site-status green">Supported</span>
      </div>
      <div class="site-row">
        <span class="site-dot yellow"></span>
        <div class="site-info"><span class="site-name">WeTriedTLS</span><span class="site-url">Wetriedtls.com</span></div>
        <span class="site-status yellow">Coming Soon</span>
      </div>
      <div class="site-row">
        <span class="site-dot yellow"></span>
        <div class="site-info"><span class="site-name">Webnovel Translations</span><span class="site-url">Webnoveltranslations.net</span></div>
        <span class="site-status yellow">Coming Soon</span>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section collapsible" id="progress-section">
    <div class="coll-toggle open" id="progress-toggle" onclick="toggleCollapsible('progress')">
      <div class="coll-label-right">
        <span class="coll-label">Progress</span>
        <span class="status-badge running" id="status-badge">Running</span>
      </div>
      <span class="coll-chevron" id="progress-chevron">▼</span>
    </div>
    <div class="coll-body visible" id="progress-body">
      <div class="progress-inner">
        <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="log" id="log"></div>
        <div class="download-area" id="download-area">
          <a class="download-link" id="download-link">↓ Download File</a>
        </div>
      </div>
    </div>
  </div>

  <div class="api-notice">
    Backend on Railway ·
    <a href="https://github.com/topstop5/topstop5.github.io" target="_blank">Source</a>
  </div>

</div>
<script>
  const API_BASE = 'https://topstop5githubio-production.up.railway.app';
  let selectedFormat = 'txt';

  // ── Generic collapsible ────────────────────────────────────────────────────
  function toggleCollapsible(id) {
    const toggle = document.getElementById(id + '-toggle');
    const body   = document.getElementById(id + '-body');
    const isOpen = body.classList.contains('visible');
    toggle.classList.toggle('open',   !isOpen);
    body.classList.toggle('visible',  !isOpen);
  }

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function setFormat(fmt) {
    selectedFormat = fmt;
    document.getElementById('fmt-txt').classList.toggle('active',  fmt === 'txt');
    document.getElementById('fmt-epub').classList.toggle('active', fmt === 'epub');
  }

  function onSiteChange() {
    const ph = {
      novelfire:            'https://novelfire.net/book/your-novel-slug',
      wetriedtls:           'https://wetriedtls.com/series/your-novel-slug',
      webnoveltranslations: 'https://webnoveltranslations.net/novel/your-novel',
    };
    document.getElementById('novel-url').placeholder =
      ph[document.getElementById('site-select').value] || 'Paste the novel page URL here...';
  }

  function addLog(msg, cls = '') {
    const el  = document.getElementById('log');
    const div = document.createElement('div');
    if (cls) div.className = cls;
    div.textContent = msg;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function setProgress(pct) {
    document.getElementById('progress-bar').style.width = Math.min(100, pct) + '%';
  }

  function setBadge(state) {
    const b = document.getElementById('status-badge');
    b.className   = 'status-badge ' + state;
    b.textContent = state.charAt(0).toUpperCase() + state.slice(1);
  }

  function resetProgress() {
    document.getElementById('progress-section').classList.add('visible');
    document.getElementById('progress-body').classList.add('visible');
    document.getElementById('progress-toggle').classList.add('open');
    document.getElementById('download-area').classList.remove('visible');
    document.getElementById('log').innerHTML = '';
    setProgress(0);
    setBadge('running');
  }

  function triggerDownload(filename, mime, b64) {
    const bytes  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const blob   = new Blob([bytes], { type: mime });
    const objUrl = URL.createObjectURL(blob);
    const link   = document.getElementById('download-link');
    link.href        = objUrl;
    link.download    = filename;
    link.textContent = `↓ Download ${filename}`;
    document.getElementById('download-area').classList.add('visible');
    link.click();
  }
  // ── Main entry ─────────────────────────────────────────────────────────────
  async function startScrape() {
    const site  = document.getElementById('site-select').value;
    const url   = document.getElementById('novel-url').value.trim();
    const start = parseInt(document.getElementById('start-ch').value);
    const end   = parseInt(document.getElementById('end-ch').value);

    if (!site)  { alert('Please select a site.');             return; }
    if (!url)   { alert('Please enter a novel URL.');         return; }
    if (isNaN(start) || isNaN(end) || start < 1 || end < start)
      { alert('Please enter a valid chapter range.'); return; }
    if (end - start > 99) { alert('Maximum 100 chapters per request.'); return; }

    document.getElementById('scrape-btn').disabled = true;
    resetProgress();

    const total   = end - start + 1;
    const payload = { url, start, end, format: selectedFormat };

    addLog(`// Site:     ${site}`,                             'info');
    addLog(`// URL:      ${url}`,                              'info');
    addLog(`// Chapters: ${start} → ${end}  (${total} total)`,'info');
    addLog(`// Format:   ${selectedFormat.toUpperCase()}`,     'info');
    addLog('');

    // Try SSE stream; fall back to classic single-response on failure
    let ok = false;
    try {
      ok = await scrapeStream(payload, total);
    } catch (e) {
      addLog(`Stream unavailable (${e.message}), using classic mode…`, 'warn');
    }
    if (!ok) await scrapeClassic(payload, total);

    document.getElementById('scrape-btn').disabled = false;
  }

  // ── Client-fetch path (wetriedtls and other client_fetch sites) ────────────
  // The Railway backend cannot reach these hosts. The browser loads each chapter
  // in a hidden iframe, waits for React to render the content, grabs the HTML,
  // then POSTs batches to /scrape-client-stream for extraction + file building.
  async function scrapeClientFetch(payload, total) {
    const { url, start, end, format } = payload;

    // Build base URL (strip trailing /chapter-N)
    const baseUrl = url.replace(/\/chapter-\d+\/?$/, '').replace(/\/$/, '');
    const domain  = new URL(url).hostname.replace(/^www\./, '');

    addLog('Using browser-fetch mode (site requires JS rendering)…', 'warn');

    // Create a hidden iframe used to load each chapter
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1280px;height:900px;opacity:0;pointer-events:none;';
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
    document.body.appendChild(iframe);

    const chaptersData = [];  // [{ch, html}]
    let endOfNovel = false;

    for (let ch = start; ch <= end; ch++) {
      const chUrl = `${baseUrl}/chapter-${ch}`;
      addLog(`Fetching chapter ${ch}…`, 'info');

      try {
        const html = await loadChapterInIframe(iframe, chUrl, ch);

        // Quick sanity: POST to /parse to verify content was found
        const check = await fetch(`${API_BASE}/parse`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ domain, ch, html }),
        }).then(r => r.json()).catch(() => ({ ok: false, error: 'parse request failed' }));

        if (!check.ok) {
          if (check.end_of_novel) {
            addLog(`ℹ Novel ends at chapter ${ch - 1}.`, 'warn');
            endOfNovel = true;
            break;
          }
          addLog(`✗ Chapter ${ch}: ${check.error}`, 'err');
          // Still include the raw html so server can attempt extraction
        }

        chaptersData.push({ ch, html });
        addLog(`✓ Chapter ${ch} fetched`, 'ok');
        setProgress(((ch - start + 1) / total) * 75);

      } catch (e) {
        addLog(`✗ Chapter ${ch} error: ${e.message}`, 'err');
        if (e.message.includes('X-Frame-Options') || e.message.includes('blocked') || e.message.includes('timeout')) {
          addLog('Site is blocking iframe embedding. Try the server-side path or a different browser.', 'warn');
          iframe.remove();
          return;
        }
      }
    }

    iframe.remove();

    if (!chaptersData.length) {
      addLog('No chapters fetched.', 'err');
      setBadge('error');
      return;
    }

    addLog('Sending to backend for file assembly…', 'info');
    setProgress(80);

    // POST all chapters to /scrape-client-stream
    const streamPayload = { url, start, end, format, chapters: chaptersData };
    const res = await fetch(`${API_BASE}/scrape-client-stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(streamPayload),
    });

    if (!res.ok || !res.body) {
      addLog(`Backend error: ${res.status}`, 'err');
      setBadge('error');
      return;
    }

    // Read SSE stream from /scrape-client-stream
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buf     = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const dataLine = part.split('\n').find(l => l.startsWith('data:'));
        if (!dataLine) continue;
        let data = {};
        try { data = JSON.parse(dataLine.slice(5)); } catch { continue; }
        onSSEEvent('message', data, total);
        if (data.type === 'done' || data.type === 'error') { reader.cancel(); return; }
      }
    }
  }

  // Load a URL in the iframe and wait for the reader content to appear
  function loadChapterInIframe(iframe, url, chNum) {
    return new Promise((resolve, reject) => {
      const TIMEOUT_MS   = 20000;
      const POLL_INTERVAL = 300;
      let   elapsed      = 0;
      let   pollTimer    = null;

      function cleanup() {
        if (pollTimer) clearInterval(pollTimer);
      }

      iframe.onload = () => {
        // Poll for React-rendered content
        pollTimer = setInterval(() => {
          elapsed += POLL_INTERVAL;
          try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            // Look for rendered content selectors
            const found = doc.querySelector('.reader-container') ||
                          doc.querySelector('[class*="reader"]') ||
                          doc.querySelector('[class*="chapter"]') ||
                          doc.querySelector('article');
            if (found && found.innerText && found.innerText.trim().length > 100) {
              cleanup();
              resolve(doc.documentElement.outerHTML);
              return;
            }
          } catch (e) {
            // Cross-origin access blocked
            cleanup();
            reject(new Error('Cross-origin iframe access blocked — site cannot be scraped this way'));
            return;
          }
          if (elapsed >= TIMEOUT_MS) {
            cleanup();
            // Timeout — return whatever HTML we have (server will try __NEXT_DATA__)
            try {
              const doc = iframe.contentDocument || iframe.contentWindow.document;
              resolve(doc.documentElement.outerHTML);
            } catch {
              reject(new Error(`Chapter ${chNum} render timeout and cross-origin block`));
            }
          }
        }, POLL_INTERVAL);
      };

      iframe.onerror = () => {
        cleanup();
        reject(new Error(`Failed to load chapter ${chNum}`));
      };

      iframe.src = url;
    });
  }

  // ── SSE streaming path ─────────────────────────────────────────────────────
  function scrapeStream(payload, total) {
    return new Promise((resolve, reject) => {
      addLog('Connecting…', 'warn');

      fetch(`${API_BASE}/scrape-stream`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }).then(res => {
        if (!res.ok || !res.body) { reject(new Error('No stream')); return; }

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let   buf     = '';

        function pump() {
          reader.read().then(({ done, value }) => {
            if (done) { resolve(true); return; }

            buf += decoder.decode(value, { stream: true });
            const parts = buf.split('\n\n');
            buf = parts.pop();                 // keep incomplete chunk

            for (const part of parts) {
              const evLine   = part.split('\n').find(l => l.startsWith('event:'));
              const dataLine = part.split('\n').find(l => l.startsWith('data:'));
              if (!dataLine) continue;
              const ev   = evLine ? evLine.slice(7).trim() : 'message';
              let   data = {};
              try { data = JSON.parse(dataLine.slice(5)); } catch { continue; }

              onSSEEvent(ev, data, total);

              if (data.type === 'done' || data.type === 'error') { reader.cancel(); resolve(true); return; }
            }
            pump();
          }).catch(reject);
        }
        pump();
      }).catch(reject);
    });
  }

  function onSSEEvent(ev, data, total) {
    const type = data.type || ev;

    if (type === 'start') {
      addLog(`Scraping "${data.title || 'novel'}" — ${total} chapters…`, 'info');

    } else if (type === 'progress') {
      if (data.ch !== undefined) {
        setProgress((data.done / data.total) * 100);
        addLog(data.ok ? `✓ Chapter ${data.ch}` : `✗ Chapter ${data.ch} failed`,
               data.ok ? 'ok' : 'err');
      } else if (data.message) {
        addLog(data.message, 'info');
      }

    } else if (type === 'done') {
      setProgress(100);
      addLog('');
      addLog(`Done! ${data.chapters} chapters scraped.`, 'ok');
      if (data.failed?.length) addLog(`Failed: chapters ${data.failed.join(', ')}`, 'warn');
      setBadge('done');
      triggerDownload(data.filename, data.mimetype, data.data);

    } else if (type === 'error') {
      addLog('');
      addLog(`Error: ${data.message}`, 'err');
      if (data.failed?.length) addLog(`Failed chapters: ${data.failed.join(', ')}`, 'err');
      setBadge('error');
    }
  }

  // ── Classic single-response path (fallback) ────────────────────────────────
  async function scrapeClassic(payload, total) {
    addLog('Sending request (may take several minutes)…', 'warn');

    let prog = 10;
    setProgress(prog);
    const ticker = setInterval(() => { if (prog < 85) setProgress(++prog); }, 3000);

    try {
      const res = await fetch(`${API_BASE}/scrape`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      clearInterval(ticker);
      setProgress(92);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Unknown server error.' }));
        addLog('');
        addLog(`Error: ${err.error}`, 'err');
        if (err.end_of_novel) addLog(`ℹ Novel ends before chapter ${err.end_of_novel}.`, 'warn');
        if (err.failed?.length) addLog(`Failed: ${err.failed.join(', ')}`, 'err');
        setBadge('error');
        return;
      }

      const disp     = res.headers.get('Content-Disposition') || '';
      const match    = disp.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
      const filename = match ? match[1].replace(/['"]/g, '') :
                       `chapters.${payload.format === 'epub' ? 'epub' : 'zip'}`;

      const blob   = await res.blob();
      const objUrl = URL.createObjectURL(blob);
      setProgress(100);
      addLog('');
      addLog(`Done! Chapters ${payload.start}–${payload.end} downloaded.`, 'ok');
      setBadge('done');

      const link       = document.getElementById('download-link');
      link.href        = objUrl;
      link.download    = filename;
      link.textContent = `↓ Download ${filename}`;
      document.getElementById('download-area').classList.add('visible');
      link.click();

    } catch (e) {
      clearInterval(ticker);
      addLog('');
      addLog(`Network error: ${e.message}`, 'err');
      addLog('Make sure the Railway backend is running.', 'warn');
      setBadge('error');
    }
  }
</script>
</body>
</html>
