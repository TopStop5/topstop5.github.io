<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TopStop5</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --panel: #080808;
      --accent: #7C3AED;
      --accent2: #a855f7;
      --text: #f3f3f3;
      --muted: #9d9d9d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .brand-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--accent2);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .brand-name {
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.4s;
    }

    .brand-name span {
      color: var(--accent2);
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 0.7s;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.9s;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 32px;
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 4px;
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(124,58,237,0.05);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .nav-link::before {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.15), transparent);
      transition: left 0.4s ease;
    }

    .nav-link:hover::before { left: 100%; }

    .nav-link:hover {
      border-color: var(--accent);
      background: rgba(124,58,237,0.12);
      color: #fff;
      transform: translateX(4px);
    }

    .nav-link .icon {
      font-size: 18px;
      opacity: 0.8;
    }

    .nav-link .arrow {
      margin-left: auto;
      font-size: 12px;
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.2s ease;
    }

    .nav-link:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .footer {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 1.3s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-tag">// tools by</div>
      <div class="brand-name">Top<span>Stop5</span></div>
    </div>

    <div class="divider"></div>

    <nav class="nav">
      <a href="checker.html" class="nav-link">
        <span class="icon">⛏</span>
        Username Checker
        <span class="arrow">→</span>
      </a>
    </nav>

    <div class="footer">Minecraft · Tools · Utilities</div>
  </div>
</body>
</html>
